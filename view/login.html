<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/login.css"> 
    <link rel="stylesheet" href="/css/responsive.css">   
    <title>Utherian technologies</title>
    <link rel="shortcut icon" href="/images/Utherian Logo in white.png" type="image/x-icon">

</head>
<body >

    <!-- Header section start -->
    <header class="login-page">
        <!-- header section top status start  -->
        <ul class="header-setion-top-status">
        
          
           
            <li><a href="../view/sign_up.html" title="sign-up"><img src="../images/download-26.png" alt="" class="social-contact" height="20px" width="20px"></a></li>
            <li><a href="../view/login.html" title="Log-in"><img src="../images/download-21.png" alt="" class="social-contact" height="20px" width="20px"></a></li>
        </ul>
        <!-- header section top status end  -->

            <!-- header section top header start  -->
            <ul class="header-section-top-header">
                
                <li>
                    <nav>
                        <h4 class="company-name">Utherian technologies</h4>
                    </nav>
                </li>

              
              </ul>
             <!-- header section top header end  -->

            <!-- header section first page start -->
                <div class="header-section-first-page"> 
                   
                    <section class="first-page-container">
                        <div class="form-container">
                            
                        <form action="/login" method="post" id="form-login">
                            <section>
                                <img src="/images/Utherian technologies white 2.png" alt="" class="logo">
                                <h4 class="sign-up-slogan">Log in</h4>
                                <h5 class="sign-up-slogan">Log in if an account already exist.</h5>
                             
                            </section>
                            
                    
                            <input type="text" name="user_name" id="user_name_login" placeholder="User name" class="sign-up" required autocomplete="additional-name" > 
                            <input type="email" name="email" id="email_login" placeholder="Email" class="sign-up" required autocomplete="email">
                            <input type="password" name="password" id="password_login" placeholder="Password" class="sign-up" required autocomplete="current-password">
                           
                         
                            <button type="submit" class="submit-btn">Log in</button>
                      
                            <div>
                                <h5 class="login-detail">Create an account <span> <a href="./sign_up.html" class="submit-btn-login">Sign up</a></span></h5>
                                 <h5 class="login-detail" >forgot password <span><a href="">Reset password</a></span></h5>
                         
                            </div>
                           
                            <p id="login-message" class="login-message visible-message">message</p>
                            
                                <h6>Powered by Utherian all copy rights &copy; reserved <span id="date"></span>.</h6>
                        </form> 
                      
                        </div>
                       
                   
                    </section>
                        
                </div>
                <!-- header section first page end -->
    </header>
    <!-- Header section ends -->

    <!-- Main section start -->
   

  

    <script src="/js/login.js" defer></script>
</body>
</html>
